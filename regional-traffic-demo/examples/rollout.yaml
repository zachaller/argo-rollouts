apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: nginx:1.19-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: 16Mi
            cpu: 5m
  strategy:
    canary:
      steps:
      # Step 1: Shift all traffic to secondary so we can safely update primary
      - plugin:
          name: regional-traffic/shift
          config:
            routerName: demo-app-traffic
            regions:
            - name: secondary
              weight: 100
            - name: primary
              weight: 0

      # Step 2: Deploy new version to all pods (canary weight 100%)
      - setWeight: 100
      - pause:
            duration: 30s

      # Step 3: Start shifting traffic back to primary at 25%
      - plugin:
          name: regional-traffic/shift
          config:
            routerName: demo-app-traffic
            regions:
            - name: secondary
              weight: 80
            - name: primary
              weight: 20

      # Step 4: Pause for 1 minute to monitor
      - pause:
          duration: 30s

      # Step 5: Increase primary traffic to 75%
      - plugin:
          name: regional-traffic/shift
          config:
            routerName: demo-app-traffic
            regions:
            - name: secondary
              weight: 40
            - name: primary
              weight: 60

      # Step 6: Pause for 1 minute to monitor
      - pause:
          duration: 30s

      # Step 7: Complete migration - shift all traffic back to primary
      - plugin:
          name: regional-traffic/shift
          config:
            routerName: demo-app-traffic
            regions:
            - name: secondary
              weight: 0
            - name: primary
              weight: 100
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 3
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: nginx:1.19-alpine
        ports:
        - containerPort: 80
  strategy:
    canary:
      steps:
      # Step 1: Shift all traffic to secondary (with manual abort mode)
      # If aborted, will shift 100% traffic to the specified region (secondary)
      - plugin:
          name: regional-traffic/shift
          config:
            routerName: demo-app-traffic
            abortMode: manual
            region: secondary
            regions:
            - name: secondary
              weight: 100
            - name: primary
              weight: 0

      # Step 2: Deploy new code to all pods
      - setWeight: 100
      - pause:
          duration: 5s

      # Step 3: Start shifting traffic back to primary (25%)
      # Default restore abort mode - will restore to original distribution
      - plugin:
          name: regional-traffic/shift
          config:
            routerName: demo-app-traffic
            abortMode: manual
            region: secondary
            regions:
            - name: secondary
              weight: 75
            - name: primary
              weight: 25

      # Step 4: Pause for observation
      - pause:
          duration: 5s

      # Step 5: Continue shifting to primary (75%)
      - plugin:
          name: regional-traffic/shift
          config:
            routerName: demo-app-traffic
            abortMode: manual
            region: secondary
            regions:
            - name: secondary
              weight: 25
            - name: primary
              weight: 75

      # Step 6: Pause for observation
      - pause:
          duration: 5s

      # Step 7: Complete migration to primary (100%)
      - plugin:
          name: regional-traffic/shift
          config:
            routerName: demo-app-traffic
            abortMode: manual
            region: secondary
            regions:
            - name: secondary
              weight: 0
            - name: primary
              weight: 100
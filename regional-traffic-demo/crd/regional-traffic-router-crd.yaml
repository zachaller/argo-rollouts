apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: regionaltrafficrouters.demo.argoproj.io
spec:
  group: demo.argoproj.io
  names:
    kind: RegionalTrafficRouter
    listKind: RegionalTrafficRouterList
    plural: regionaltrafficrouters
    singular: regionaltrafficrouter
    shortNames:
    - rtr
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              serviceName:
                type: string
                description: The name of the Kubernetes service to route traffic for
              regions:
                type: array
                description: List of regions and their traffic weights
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Region name (e.g., primary, secondary)
                    weight:
                      type: integer
                      minimum: 0
                      maximum: 100
                      description: Percentage of traffic to send to this region
                  required:
                  - name
                  - weight
            required:
            - serviceName
            - regions
          status:
            type: object
            properties:
              lastUpdated:
                type: string
                format: date-time
              currentDistribution:
                type: string
                description: Human-readable representation of current traffic distribution
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Service
      type: string
      jsonPath: .spec.serviceName
    - name: Distribution
      type: string
      jsonPath: .status.currentDistribution
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp